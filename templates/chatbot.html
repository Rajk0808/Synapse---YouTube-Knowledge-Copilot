<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Synapse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --surface2:  #1a1a26;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --accent:    #7c6fef;
      --accent2:   #a89bf5;
      --accent-glow: rgba(124,111,239,0.25);
      --text:      #f0eeff;
      --muted:     rgba(240,238,255,0.45);
      --muted2:    rgba(240,238,255,0.25);
      --user-bg:   #1e1a3a;
      --user-border: rgba(124,111,239,0.35);
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,111,239,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,111,239,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 64px;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      position: relative;
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--text);
      position: relative;
    }

    .brand span {
      color: var(--accent2);
    }

    .brand-tag {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-left: 2px;
      vertical-align: super;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.6);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }

    .status-dot.off {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239,68,68,0.6);
    }

    .profile-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .profile-btn:hover {
      background: var(--surface);
      border-color: var(--accent);
    }

    .profile-btn svg {
      width: 18px;
      height: 18px;
      stroke: var(--muted);
    }

    .profile-btn:hover svg {
      stroke: var(--accent2);
    }

    /* ── MESSAGES AREA ── */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 0 16px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    .messages-wrap::-webkit-scrollbar { width: 3px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .messages-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 0;
      color: var(--muted);
      text-align: center;
    }

    .empty-state .big-icon {
      width: 48px;
      height: 48px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
    }

    .empty-state p {
      font-size: 14px;
      font-weight: 300;
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── MESSAGE ROWS ── */
    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeUp 0.25s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { justify-content: flex-end; }

    .bot-av {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bot-av svg {
      width: 16px;
      height: 16px;
      stroke: var(--accent2);
    }

    .bubble {
      max-width: 68%;
      padding: 12px 16px;
      font-size: 14.5px;
      line-height: 1.65;
      font-weight: 400;
      word-break: break-word;
      position: relative;
    }

    .bubble.bot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: 16px 4px 16px 16px;
      color: var(--text);
    }

    .bubble .ts {
      display: block;
      font-size: 11px;
      margin-top: 6px;
      color: var(--muted2);
      font-weight: 300;
      letter-spacing: 0.2px;
    }

    .bubble.user .ts { text-align: right; }

    /* thinking */
    .thinking-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeUp 0.2s ease forwards;
    }

    .thinking-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .tdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.3s infinite ease-in-out;
    }
    .tdot:nth-child(2) { animation-delay: 0.18s; }
    .tdot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    /* ── INPUT AREA ── */
    .input-wrap {
      position: relative;
      z-index: 10;
      padding: 16px 24px 24px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      flex-shrink: 0;
    }

    .input-box {
      max-width: 740px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.55;
      resize: none;
      max-height: 130px;
      overflow-y: auto;
      padding: 2px 0;
    }

    textarea::placeholder { color: var(--muted2); }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.35;
      transition: opacity 0.2s, transform 0.15s, background 0.2s;
    }

    .send-btn:not(:disabled) { opacity: 1; }
    .send-btn:not(:disabled):hover  { background: var(--accent2); transform: scale(1.05); }
    .send-btn:not(:disabled):active { transform: scale(0.95); }
    .send-btn:disabled { cursor: default; }

    .send-btn svg { width: 16px; height: 16px; }

    .hint {
      max-width: 740px;
      margin: 8px auto 0;
      font-size: 11.5px;
      color: var(--muted2);
      font-weight: 300;
      letter-spacing: 0.2px;
      padding: 0 4px;
    }

    /* ── MARKDOWN RENDERED INSIDE BOT BUBBLES ── */
    .md-body { line-height: 1.7; }
    .md-body p { margin: 0 0 10px; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body strong { font-weight: 500; color: var(--accent2); }
    .md-body em { font-style: italic; color: var(--muted); }
    .md-body h1,.md-body h2,.md-body h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--text);
      margin: 14px 0 6px;
      line-height: 1.3;
    }
    .md-body h1 { font-size: 17px; }
    .md-body h2 { font-size: 15px; }
    .md-body h3 { font-size: 14px; }
    .md-body ul, .md-body ol {
      padding-left: 20px;
      margin: 8px 0 10px;
    }
    .md-body li { margin-bottom: 4px; }
    .md-body li::marker { color: var(--accent2); }
    .md-body blockquote {
      border-left: 2px solid var(--accent);
      margin: 10px 0;
      padding: 6px 12px;
      color: var(--muted);
      font-style: italic;
      background: var(--surface2);
      border-radius: 0 8px 8px 0;
    }
    .md-body code {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--accent2);
      padding: 1px 6px;
      border-radius: 5px;
    }
    .md-body pre {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
    }
    .md-body a { color: var(--accent2); text-decoration: underline; }
    .md-body hr {
      border: none;
      border-top: 1px solid var(--border2);
      margin: 12px 0;
    }
    .md-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 10px 0;
    }
    .md-body th {
      background: var(--surface2);
      color: var(--accent2);
      font-weight: 500;
      padding: 6px 10px;
      border: 1px solid var(--border2);
      text-align: left;
    }
    .md-body td {
      padding: 6px 10px;
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="6" fill="#7c6fef" opacity="0.9"/>
          <circle cx="4"  cy="10" r="3" fill="#a89bf5" opacity="0.7"/>
          <circle cx="28" cy="10" r="3" fill="#a89bf5" opacity="0.7"/>
          <circle cx="4"  cy="22" r="3" fill="#a89bf5" opacity="0.7"/>
          <circle cx="28" cy="22" r="3" fill="#a89bf5" opacity="0.7"/>
          <line x1="10" y1="14" x2="4"  y2="10"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
          <line x1="22" y1="14" x2="28" y2="10"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
          <line x1="10" y1="18" x2="4"  y2="22"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
          <line x1="22" y1="18" x2="28" y2="22"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
        </svg>
      </div>
      <div class="brand">Syn<span>apse</span><sup class="brand-tag">AI</sup></div>
    </div>

    <div class="nav-right">
      <div class="status-pill">
        <div class="status-dot off" id="status-dot"></div>
        <span id="status-text">Connecting</span>
      </div>
      <div class="profile-btn" title="Profile (coming soon)">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
      </div>
    </div>
  </nav>

  <!-- MESSAGES -->
  <div class="messages-wrap" id="messages-wrap">
    <div class="messages-inner" id="messages">

      <div class="empty-state" id="empty-state">
        <div class="big-icon">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="6" fill="#7c6fef" opacity="0.9"/>
            <circle cx="4"  cy="10" r="3" fill="#a89bf5" opacity="0.6"/>
            <circle cx="28" cy="10" r="3" fill="#a89bf5" opacity="0.6"/>
            <circle cx="4"  cy="22" r="3" fill="#a89bf5" opacity="0.6"/>
            <circle cx="28" cy="22" r="3" fill="#a89bf5" opacity="0.6"/>
            <line x1="10" y1="14" x2="4"  y2="10"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
            <line x1="22" y1="14" x2="28" y2="10"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
            <line x1="10" y1="18" x2="4"  y2="22"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
            <line x1="22" y1="18" x2="28" y2="22"  stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>
          </svg>
        </div>
        <h3>Start a conversation</h3>
        <p>Ask Synapse anything. Your messages are private and processed in real time.</p>
      </div>

    </div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="input-box">
      <textarea id="msg-input" placeholder="Message Synapse…" rows="1"
                oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>

<script>
  var ws;

  function fmt() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function renderMd(text) {
    if (typeof marked !== 'undefined') {
      return marked.parse(text, { breaks: true, gfm: true });
    }
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function esc(s) {
    return s
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  function setStatus(on) {
    var dot  = document.getElementById('status-dot');
    var txt  = document.getElementById('status-text');
    dot.className = 'status-dot' + (on ? '' : ' off');
    txt.textContent = on ? 'Online' : 'Reconnecting…';
  }

  function scrollBottom() {
    var wrap = document.getElementById('messages-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  }

  function clearEmpty() {
    var e = document.getElementById('empty-state');
    if (e) e.remove();
  }

  var BOT_AV =
    '<div class="bot-av"><svg viewBox="0 0 32 32" fill="none" stroke-linecap="round">' +
    '<circle cx="16" cy="16" r="5" fill="#7c6fef" opacity="0.9"/>' +
    '<circle cx="4" cy="10" r="2.5" fill="#a89bf5" opacity="0.6"/>' +
    '<circle cx="28" cy="10" r="2.5" fill="#a89bf5" opacity="0.6"/>' +
    '<line x1="11" y1="14" x2="4" y2="10" stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>' +
    '<line x1="21" y1="14" x2="28" y2="10" stroke="#7c6fef" stroke-width="1.2" opacity="0.5"/>' +
    '</svg></div>';

  function appendUser(text) {
    clearEmpty();
    var msgs = document.getElementById('messages');
    var row  = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML =
      '<div class="bubble user">' + esc(text) +
      '<span class="ts">' + fmt() + '</span></div>';
    msgs.appendChild(row);
    scrollBottom();
  }

  function showThinking() {
    var msgs = document.getElementById('messages');
    var row  = document.createElement('div');
    row.className = 'thinking-row';
    row.id = 'thinking';
    row.innerHTML =
      BOT_AV +
      '<div class="thinking-bubble">' +
        '<span class="tdot"></span>' +
        '<span class="tdot"></span>' +
        '<span class="tdot"></span>' +
      '</div>';
    msgs.appendChild(row);
    scrollBottom();
  }

  function hideThinking() {
    var el = document.getElementById('thinking');
    if (el) el.remove();
  }

  function appendBot(text) {
    hideThinking();
    var msgs = document.getElementById('messages');
    var row  = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML =
      BOT_AV +
      '<div class="bubble bot"><div class="md-body">' + renderMd(text) + '</div>' +
      '<span class="ts">' + fmt() + '</span></div>';
    msgs.appendChild(row);
    scrollBottom();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
    var btn = document.getElementById('send-btn');
    btn.disabled = el.value.trim() === '';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendMessage() {
    var input = document.getElementById('msg-input');
    var text  = input.value.trim();
    if (!text) return;

    appendUser(text);
    showThinking();

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(text);
    } else {
      setTimeout(function() {
        appendBot('Not connected to server. Make sure your FastAPI backend is running at ws://localhost:8000/ws/chat');
      }, 900);
    }

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
  }

  var msgBuffer = '';
  var bufferTimer = null;
  var currentBotRow = null;

  function flushBuffer() {
    if (!msgBuffer.trim()) return;
    var text = msgBuffer;
    msgBuffer = '';
    bufferTimer = null;
    currentBotRow = null;

    hideThinking();
    var msgs = document.getElementById('messages');
    var row  = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML =
      BOT_AV +
      '<div class="bubble bot"><div class="md-body">' + renderMd(text) + '</div>' +
      '<span class="ts">' + fmt() + '</span></div>';
    msgs.appendChild(row);
    scrollBottom();
  }

  function handleChunk(chunk) {
    var END_TOKENS = ['[DONE]', '<END>', '[END]', '<<END>>'];
    for (var i = 0; i < END_TOKENS.length; i++) {
      if (chunk === END_TOKENS[i]) { flushBuffer(); return; }
    }

    msgBuffer += chunk;

    if (bufferTimer) clearTimeout(bufferTimer);
    bufferTimer = setTimeout(flushBuffer, 600);
  }

  function connect() {
    try {
      ws = new WebSocket('ws://localhost:8000/ws/chat');
      ws.onopen    = function() { setStatus(true); };
      ws.onmessage = function(e) { handleChunk(e.data); };
      ws.onclose   = function() { setStatus(false); hideThinking(); flushBuffer(); setTimeout(connect, 3000); };
      ws.onerror   = function() { setStatus(false); };
    } catch(err) {
      setStatus(false);
    }
  }

  connect();
</script>
</body>
</html>
